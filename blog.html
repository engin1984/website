<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>e-ng.in/blog</title>


    <script>
      const theme = localStorage.getItem("theme");
      if (theme === "dark" || theme === null) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    </script>
  </head>
  <body>
    <div class="window">
      <div class="titlebar">
        <span class="dot r"></span><span class="dot y"></span
        ><span class="dot g"></span>
        <span class="ttitle">e-ng.in/blog</span>
        <label class="theme-switch" aria-label="Toggle dark mode">
          <input type="checkbox" id="themeToggle">
          <span class="slider">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="moon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sun"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
          </span>
        </label>
      </div>
      <div class="body">

        <!-- NAV -->
        <div class="line">
          <a href="index.html" class="link">&lt;- cd .. (back to home)</a>
        </div>

        <div class="divider"></div>

        <!-- BLOG -->
        <div class="line">
          <span class="key">#e-ng.in</span
          ><span class="val color-blog">blog</span>
        </div>
        <div class="line">
          <div><a class="link js-modal-trigger" data-target="blog-modal">My first post: Welcome</a></div>
          <div><a class="link js-modal-trigger" data-target="blog-modal">Why I teach chess to kids</a></div>
          <div><a class="link js-modal-trigger" data-target="blog-modal">Thoughts on Gifted Education</a></div>
          <div><a class="link js-modal-trigger" data-target="blog-modal">Web tinkering in 2026</a></div>
        </div>

        <div class="divider"></div>

        <span class="cursor"></span>
      </div>
    </div>

    <!-- The Modal -->
    <div id="blog-modal" class="modal">
      <div class="modal-card">
        <div class="modal-header">
          <span class="modal-title">> cat post.txt</span>
          <button class="modal-close-btn js-modal-close">X</button>
        </div>
        <div class="line val" style="line-height: 1.6;">
          Content is currently under construction...<br><br>
          <span class="dim">Please check back later!</span>
        </div>
      </div>
    </div>

    <script type="module" src="_main.js"></script>
  </body>
</html>
